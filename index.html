    // Helper function to add pinyin to sentences
    // ------------------------------------------------------------
    function addPinyinToSentence(chinese) {
        const pinyinMap = {
            "我": "wǒ", "你": "nǐ", "他": "tā", "她": "tā", "我们": "wǒmen", "你们": "nǐmen", "他们": "tāmen",

            "朋友": "péngyǒu", "老师": "lǎoshī", "学生": "xuésheng", "妈妈": "māma", "爸爸": "bàba",
            "苹果": "píngguǒ", "水": "shuǐ", "茶": "chá", "咖啡": "kāfēi", "米饭": "mǐfàn", "面包": "miànbāo",
            "猫": "māo", "狗": "gǒu", "花": "huā", "草": "cǎo", "树": "shù", "天": "tiān", "地": "dì",
            "家": "jiā", "学校": "xuéxiào", "书": "shū", "车": "chē", "电脑": "diànnǎo", "手机": "shǒujī",
            "电影": "diànyǐng", "音乐": "yīnyuè", "今天": "jīntiān", "明天": "míngtiān", "昨天": "zuótiān",
            "早上": "zǎoshang", "晚上": "wǎnshang", "中午": "zhōngwǔ", "现在": "xiànzài", "什么": "shénme",
            "怎么": "zěnme", "为什么": "wèishénme", "谁": "shuí", "哪里": "nǎlǐ", "哪个": "nǎge",
            "一": "yī", "二": "èr", "三": "sān", "四": "sì", "五": "wǔ", "六": "liù", "七": "qī", "八": "bā", "九": "jiǔ", "十": "shí",
            "个": "gè", "杯": "bēi", "本": "běn", "辆": "liàng", "只": "zhī", "朵": "duǒ",
            "请": "qǐng", "谢谢": "xièxie", "对不起": "duìbuqǐ", "没关系": "méiguānxi", "再见": "zàijiàn",
            "吗": "ma", "呢": "ne", "吧": "ba", "这": "zhè", "那": "nà", "哪": "nǎ",
            "人": "rén", "名字": "míngzi", "颜色": "yánsè", "红色": "hóngsè", "蓝色": "lánsè",
            "漂亮": "piàoliang", "可爱": "kěài", "好吃": "hǎochī", "好喝": "hǎohē", "睡觉": "shuìjiào",
            "做饭": "zuòfàn", "天气": "tiānqì", "中国": "zhōngguó", "中文": "zhōngwén", "汉语": "hànyǔ",
            "电视": "diànshì", "答案": "dá'àn", "孩子": "háizi", "们": "men", "玩": "wán",
            "工作": "gōngzuò", "忙": "máng", "坐": "zuò", "上": "shàng", "下": "xià", "雨": "yǔ", "雪": "xuě",
            "白色": "báisè", "得": "de", "快": "kuài", "慢": "màn", "吧": "ba", "一下": "yīxià",
            "路": "lù", "从": "cóng", "前": "qián", "后": "hòu", "里": "lǐ", "外": "wài",
            "小小的": "xiǎo xiǎo de", "花园": "huāyuán", "里面": "lǐmiàn", "挖": "wā", "种": "zhòng",
            "种子": "zhǒngzi", "开": "kāi", "跟着": "gēnzhe", "左手": "zuǒshǒu", "右手": "yòushǒu",
            "动作": "dòngzuò", "重播": "chóngbō", "老鼠": "lǎoshǔ", "大米": "dàmǐ", "送": "sòng",
            "因为": "yīnwèi", "温暖": "wēnnuǎn", "四季": "sìjì", "感谢": "gǎnxiè", "世界": "shìjiè",
            "美丽": "měilì", "敢": "gǎn", "说": "shuō", "告诉": "gàosu", "知道": "zhīdào", "秘密": "mìmì"
        };
        
        let result = [];
        let i = 0;
        while (i < chinese.length) {
            let found = false;
            for (let len = 4; len >= 1; len--) {
                if (i + len <= chinese.length) {
                    let word = chinese.substr(i, len);
                    if (pinyinMap[word]) {
                        result.push(pinyinMap[word]);
                        i += len;
                        found = true;
                        break;
                    }
                }
            }
            if (!found) {
                let char = chinese[i];
                if (pinyinMap[char]) {
                    result.push(pinyinMap[char]);
                } else {
                    result.push(char);
                }
                i++;
            }
        }
        return result.join(' ');
    }

    function renderNouns(list) {

            <div class="word-card">
                <div class="chinese-word">${n.chinese}</div>
                <div class="pinyin">${n.pinyin}</div>
                <div class="meaning"><strong>🇬🇧 ${n.eng}</strong> <strong>🇹🇿 ${n.swa}</strong></div>
                <div class="example">
                    <div class="example-chinese">${n.sentence}</div>
                    <div class="example-pinyin">${n.sentencePinyin}</div>
                    <div class="example-translation">${n.trans}</div>
                </div>
            </div>
        `).join('');
    }

    // ---------- FILTER FUNCTIONS ----------
    window.filterNouns = function() {
        const term = document.getElementById('nounSearch').value.toLowerCase();
        const cat = document.getElementById('nounFilter').value;
        const filtered = fullNouns.filter(n => 
            (n.chinese.includes(term) || n.pinyin.toLowerCase().includes(term) || 
             n.eng.toLowerCase().includes(term) || n.swa.toLowerCase().includes(term) ||
             n.sentence.includes(term) || n.sentencePinyin.includes(term)) &&
            (cat === 'all' || n.category === cat)
        );
        renderNouns(filtered);
    };

    window.filterVerbs = function() {
        const term = document.getElementById('verbSearch').value.toLowerCase();
        const cat = document.getElementById('verbFilter').value;
        const filtered = fullVerbs.filter(v => 
            (v.chinese.includes(term) || v.pinyin.toLowerCase().includes(term) || 
             v.eng.toLowerCase().includes(term) || v.swa.toLowerCase().includes(term) ||
             v.sentence.includes(term) || v.sentencePinyin.includes(term)) &&
            (cat === 'all' || v.category === cat)
        );
        renderVerbs(filtered);
    };

    window.filterSongs = function() {
        const term = document.getElementById('songSearch').value.toLowerCase();
        const filtered = songs.filter(s => 
            s.title.toLowerCase().includes(term) || 
            s.artist.toLowerCase().includes(term) || 
            s.snippet.toLowerCase().includes(term) ||
            s.snippetPinyin.toLowerCase().includes(term)
        );
        renderSongs(filtered);
    };

    // ---------- TAB SWITCHING ----------
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            if (btn.dataset.tab === 'nouns') document.getElementById('nounsPanel').classList.add('active');
            if (btn.dataset.tab === 'verbs') document.getElementById('verbsPanel').classList.add('active');
            if (btn.dataset.tab === 'songs') document.getElementById('songsPanel').classList.add('active');
        });
    });
